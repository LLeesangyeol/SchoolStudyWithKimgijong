spring:
  profiles:
    active: local
  datasource:
    username: root
    password: "1234"
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mariadb://localhost:3316/user_db

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mariadb://db:3306/user_db
